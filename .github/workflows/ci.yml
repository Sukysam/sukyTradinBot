name: CI

# Foundation-scoped CI (Milestone 1). Lint/format/type-check/test only
# src/ and tests/ (the `common` package) — regime-trader/ and backtest/
# are deliberately not yet under this pipeline. See the tooling-scope note
# in docs/engineering-handbook/Architecture/Known Gaps.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Black (check only)
        run: black --check src tests

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: MyPy
        run: mypy

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t regime-trader-foundation:ci .
      - name: Smoke test the image
        run: docker run --rm regime-trader-foundation:ci
