name: CI

# Lint/format/type-check/test the src/ + tests/ tree (the `common` and
# `market_data` packages), plus the one Milestone 2 exception:
# regime-trader/broker/alpaca_client.py, passed explicitly alongside
# `src tests` below. The rest of regime-trader/ and backtest/ remain
# deliberately outside this pipeline — see the tooling-scope note in
# docs/engineering-handbook/Architecture/Known Gaps.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ADAPTER_FILE: regime-trader/broker/alpaca_client.py

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev + market-data dependencies
        run: pip install -e ".[dev,market-data]"
      - name: Ruff
        run: ruff check src tests "$ADAPTER_FILE"
      - name: Black (check only)
        run: black --check src tests "$ADAPTER_FILE"

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev + market-data dependencies
        run: pip install -e ".[dev,market-data]"
      - name: MyPy
        run: mypy

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dev + market-data dependencies
        run: pip install -e ".[dev,market-data]"
      - name: Pytest
        run: pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t regime-trader-foundation:ci .
      - name: Smoke test the image
        run: docker run --rm regime-trader-foundation:ci
